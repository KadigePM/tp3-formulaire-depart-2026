<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander une brochure gratuite</title>
    <link rel="stylesheet" href="css/normalize.css" type="text/css" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
  </head>

  <body>
    <header class="entete">
      <h2 class="sous-titre">PUBLICATION GRATUITE</h2>
      <h1 class="titre">
        Commander une <span class="mot_couleur">brochure</span> gratuite
      </h1>
    </header>
    <main class="brochure">
      <div class="formulaire"> 
        <fieldset class="document champ__brochure">
          <legend>
            <img class="icon" src="images/icon-format-brochure.svg" width="20" height="50" alt="icône format brochure"/>
            <h2 class="legend">FORMAT DE LA BROCHURE</h2>
          </legend>
          <div class="selection_format">
            <input type="radio" id="format-imprime" name="format" value="imprime" required />
            <label for="format-imprime" class="radio-card">
              <img class="img_docu" src="images/icon-file-print.svg" width="50" height="50" alt="document imprimé"/>
              Imprimé
            </label>
          </div>

          <div class="selection_format">
            <input type="radio" id="format-pdf" name="format" value="pdf" />
            <label for="format-pdf" class="radio-card">
              <img class="img_docu"src="images/icon-file-pdf.svg" width="74" height="50" alt="document PDF"/>
              PDF
            </label>
          </div>

          <div class="selection_format">
            <input type="radio" id="format-epub" name="format" value="epub" />
            <label for="format-epub" class="radio-card">
              <img class="img_docu" src="images/icon-file-epub.svg" width="74" height="50" alt="document ePub"/>
              EPUB
            </label>
          </div>
        </fieldset>
        <fieldset class="champ__contact espace__contact">
          <legend>
            <img class="icon" src="images/icon-contact.svg" width="20" height="20" alt="icône contact"/>
            <h2 class="legend">INFORMATIONS DE CONTACT</h2>
          </legend>

          <div class="section__contact">
            <div class="section__prénom">
              <label class="champ__etiquette" for="prenom">Prénom</label>
              <input class="champ--prenom" id="prenom" name="prenom" type="text" required />
            </div>

            <div class="champ__nom">
              <label class="champ__etiquette" for="nom">Nom</label>
              <input class="champ--nom" id="nom" name="nom" type="text" required />
            </div>
          </div>

          <div class="champ__courriel">
            <label class="champ__etiquette" for="courriel">
              Courriel <span class="mot_form">(exemple@domaine.com)</span>
            </label>
            <input class="champ--courriel" id="courriel" name="courriel" type="email" required />
          </div>

          <div class="champ__telephone">
            <label class="champ__etiquette" for="telephone">
              Téléphone <span class="mot_form">(514 555 0123)</span>
            </label>
            <input class="champ--telephone" id="telephone" name="telephone" type="tel" required />
          </div>
        </fieldset>
        <fieldset class="champ__postales">
          <legend>
            <img class="icon" src="images/icon-postal.svg"width="20"height="20" alt="icône postale"/>
            <h2 class="legend">INFORMATIONS POSTALES</h2>
          </legend>

          <div class="champ__adress">
            <label class="champ__etiquette" for="adresse">
              Adresse <span class="mot_form">(123, rue Principale)</span>
            </label>
            <input class="champ--adresse" id="adresse" name="adresse" type="text" required />
          </div>
          <div class="location">
            <div class="champ__pays">
              <label for="pays">Pays</label>
              <select name="listepays" id="pays" required>
                <option value="">— Sélectionner —</option>
                <option value="australie">Australie</option>
                <option value="belgique">Belgique</option>
                <option value="canada">Canada</option>
                <option value="danemark">Danemark</option>
                <option value="france">France</option>
              </select>
            </div>
            <div class="champ__province">
              <label for="province">Province ou État</label>
              <select name="listeprovince" id="province" required>
                <option value="">— Sélectionner —</option>
                <option value="alberta">Alberta</option>
                <option value="colombie_britannique">Colombie-Britannique</option>
                <option value="ile_du_prince_edouard">Île-du-Prince-Édouard</option>
                <option value="manitoba">Manitoba</option>
                <option value="nouveau_brunswick">Nouveau-Brunswick</option>
                <option value="nouvelle_ecosse">Nouvelle-Écosse</option>
                <option value="ontario">Ontario</option>
                <option value="quebec">Québec</option>
                <option value="saskatchewan">Saskatchewan</option>
                <option value="terre_neuve_et_labrador">Terre-Neuve-et-Labrador</option>
              </select>
            </div>
          </div>
          <div class="champ__codepostal">
            <label class="champ__etiquette" for="code_postal">
              Code postal <span class="mot_form">(A1A 1A1)</span>
            </label>
            <input class="champ--codePostal" id="code_postal" name="postal" type="text" required />
          </div>

          <div class="case__cocher">
            <input type="checkbox" name="info" id="info" value="info" />
            <label for="info">
              Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et ressources disponibles.
            </label>
          </div>

          <div class="contact__div-soumettre">
            <input
              class="contact__champ-soumettre"
              type="submit"
              value="Commander"
            />
          </div>
        </fieldset>
      </div>
    </main>
  </body>
</html>
